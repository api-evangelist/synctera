name: Synctera
x-type: company
description: Synctera is a Banking-as-a-Service platform connecting fintechs to a
  network of sponsor banks. Provides REST APIs for personal/business customers, accounts,
  cards, internal transfers, payment schedules, ACH payments, mRDC, KYC/KYB verification,
  document verification, and disclosures.
