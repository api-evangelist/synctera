naftiko: 1.0.0-alpha2
info:
  label: Synctera API — Applications
  description: 'Synctera API — Applications. 4 operations. Lead operation: List credit applications.. Self-contained Naftiko
    capability covering one Synctera business surface.'
  tags:
  - Synctera
  - Applications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SYNCTERA_API_KEY: SYNCTERA_API_KEY
capability:
  consumes:
  - type: http
    namespace: synctera-applications
    baseUri: https://api.synctera.com/v0
    description: Synctera API — Applications business capability. Self-contained, no shared references.
    resources:
    - name: applications
      path: /applications
      operations:
      - name: listapplications
        method: GET
        description: List credit applications.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createapplication
        method: POST
        description: Create a credit application.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: applications-application_id
      path: /applications/{application_id}
      operations:
      - name: getapplication
        method: GET
        description: Get Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patchapplication
        method: PATCH
        description: Patch Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SYNCTERA_API_KEY}}'
  exposes:
  - type: rest
    namespace: synctera-applications-rest
    port: 8080
    description: REST adapter for Synctera API — Applications. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/applications
      name: applications
      description: REST surface for applications.
      operations:
      - method: GET
        name: listapplications
        description: List credit applications.
        call: synctera-applications.listapplications
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createapplication
        description: Create a credit application.
        call: synctera-applications.createapplication
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/applications/{application-id}
      name: applications-application-id
      description: REST surface for applications-application_id.
      operations:
      - method: GET
        name: getapplication
        description: Get Application
        call: synctera-applications.getapplication
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchapplication
        description: Patch Application
        call: synctera-applications.patchapplication
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: synctera-applications-mcp
    port: 9090
    transport: http
    description: MCP adapter for Synctera API — Applications. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-credit-applications
      description: List credit applications.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: synctera-applications.listapplications
      outputParameters:
      - type: object
        mapping: $.
    - name: create-credit-application
      description: Create a credit application.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: synctera-applications.createapplication
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-application
      description: Get Application
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: synctera-applications.getapplication
      outputParameters:
      - type: object
        mapping: $.
    - name: patch-application
      description: Patch Application
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: synctera-applications.patchapplication
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
