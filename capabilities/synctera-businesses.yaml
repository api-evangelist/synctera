naftiko: 1.0.0-alpha2
info:
  label: Synctera API — Businesses
  description: 'Synctera API — Businesses. 4 operations. Lead operation: List business. Self-contained Naftiko capability
    covering one Synctera business surface.'
  tags:
  - Synctera
  - Businesses
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SYNCTERA_API_KEY: SYNCTERA_API_KEY
capability:
  consumes:
  - type: http
    namespace: synctera-businesses
    baseUri: https://api.synctera.com/v0
    description: Synctera API — Businesses business capability. Self-contained, no shared references.
    resources:
    - name: businesses
      path: /businesses
      operations:
      - name: listbusinesses
        method: GET
        description: List business
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createbusiness
        method: POST
        description: Create a business
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: businesses-business_id
      path: /businesses/{business_id}
      operations:
      - name: getbusiness
        method: GET
        description: Get business
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatebusiness
        method: PATCH
        description: Patch business
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SYNCTERA_API_KEY}}'
  exposes:
  - type: rest
    namespace: synctera-businesses-rest
    port: 8080
    description: REST adapter for Synctera API — Businesses. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/businesses
      name: businesses
      description: REST surface for businesses.
      operations:
      - method: GET
        name: listbusinesses
        description: List business
        call: synctera-businesses.listbusinesses
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createbusiness
        description: Create a business
        call: synctera-businesses.createbusiness
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/businesses/{business-id}
      name: businesses-business-id
      description: REST surface for businesses-business_id.
      operations:
      - method: GET
        name: getbusiness
        description: Get business
        call: synctera-businesses.getbusiness
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatebusiness
        description: Patch business
        call: synctera-businesses.updatebusiness
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: synctera-businesses-mcp
    port: 9090
    transport: http
    description: MCP adapter for Synctera API — Businesses. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-business
      description: List business
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: synctera-businesses.listbusinesses
      outputParameters:
      - type: object
        mapping: $.
    - name: create-business
      description: Create a business
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: synctera-businesses.createbusiness
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-business
      description: Get business
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: synctera-businesses.getbusiness
      outputParameters:
      - type: object
        mapping: $.
    - name: patch-business
      description: Patch business
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: synctera-businesses.updatebusiness
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
