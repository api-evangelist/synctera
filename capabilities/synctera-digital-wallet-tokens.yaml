      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: synctera-digital-wallet-tokens.getdigitalwallettoken
      outputParameters:
      - type: object
        mapping: $.
    - name: update-digital-wallet-token-s-life
      description: Update Digital Wallet Token's life cycle status
