    resources:
    - name: rdc-deposits
      path: /rdc/deposits
      operations:
      - name: listrdcdeposits
        method: GET
        description: List Remote Check Deposits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createrdcdeposit
        method: POST
        description: Create a Remote Check Deposit
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
