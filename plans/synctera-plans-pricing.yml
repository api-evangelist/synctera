specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Synctera
providerId: synctera
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- FinTech
- BaaS
- Banking
- Payments
- Card Issuing
- KYC
- Plans
description: Synctera is sold under custom contracts with monthly platform fees, per-transaction,
  per-card, and ACH/wire fees, plus interest sharing. Sandbox is free.
notes: Pricing is bespoke per fintech program.
sources:
- https://synctera.com/
- https://docs.synctera.com/
plans:
- id: synctera-sandbox
  name: Sandbox
  type: free
  description: Self-serve free sandbox via Synctera Console.
  entries:
  - label: Sandbox Access
    name: sandbox
    type: included
    metric: api_calls
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: All APIs
  - name: Test Data
- id: synctera-program
  name: Program (Custom)
  type: enterprise
  description: Custom production contract with sponsor bank.
  entries:
  - label: Platform Fee
    name: platform_fee
    type: flat
    metric: subscription
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: negotiated
    userMultiplied: false
  - label: Per Transaction
    name: txn_fee
    type: metered
    metric: transaction
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: negotiated
    userMultiplied: false
  elements:
  - name: Sponsor Bank
  - name: Production APIs
  - name: PCI
maintainers:
